# Blog Configuration
title: "Data Science Explorations"
tagline: "Uncovering patterns in infrastructure, geology, and society through data"
description: "In-depth data science analyses exploring real-world datasets: bridge safety, mineral exploration, crime patterns, and more."
author: "Petr Salomoun"
email: "petr.salomoun@gmail.com"
url: "https://petr-salomoun.github.io"
baseurl: ""

# GitHub Pages settings - Using Cayman theme
remote_theme: pages-themes/cayman@v0.2.0

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme

# Blog settings
permalink: /posts/:year/:month/:day/:title/
show_excerpts: true

# Footer content
github:
  repository_url: https://github.com/petr-salomoun/petr-salomoun.github.io

# Build settings
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

# Collections for organizing posts
collections:
  posts:
    output: true

# Exclude from build
exclude:
  - scripts/
  - README.md
  - Gemfile
  - Gemfile.lock
  - blog_config.yaml
  - PUBLICATION_SUMMARY.md
  - REDESIGN_SUMMARY.md
